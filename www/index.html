<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ABC Fun Land!</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
    background: linear-gradient(135deg, #ffe29f, #ffa9c6, #a0e7ff);
    background-size: 400% 400%;
    animation: bgMove 12s ease infinite;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    text-align: center;
  }
  @keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  h1 {
    font-size: 3em;
    color: #ff5da2;
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.1);
    margin-bottom: 5px;
  }
  #subtitle {
    font-size: 1.3em;
    color: #444;
    margin-bottom: 20px;
  }

  /* Big letter stage */
  #stage {
    background: #fff;
    border-radius: 30px;
    box-shadow: 0 10px 0 rgba(0,0,0,0.15);
    padding: 30px 50px;
    margin-bottom: 25px;
    position: relative;
  }
  #bigLetter {
    font-size: 12em;
    font-weight: bold;
    line-height: 1;
    user-select: none;
    transition: transform 0.2s;
  }
  #bigLetter:active { transform: scale(0.9); }
  #wordHint {
    font-size: 1.8em;
    margin-top: 10px;
    color: #555;
  }
  #emoji {
    font-size: 2.5em;
  }

  /* Controls */
  #controls {
    display: flex;
    gap: 15px;
    margin-bottom: 25px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    font-family: inherit;
    font-size: 1.3em;
    font-weight: bold;
    padding: 15px 25px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 6px 0 rgba(0,0,0,0.2);
    transition: transform 0.1s;
    color: #fff;
  }
  button:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 rgba(0,0,0,0.2);
  }
  #prevBtn { background: #6ec6ff; }
  #nextBtn { background: #ff8a65; }
  #hearBtn { background: #66bb6a; }
  #quizBtn { background: #ba68c8; }

  /* Alphabet strip */
  #strip {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    max-width: 700px;
    margin-bottom: 25px;
  }
  .tile {
    width: 45px;
    height: 45px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3em;
    font-weight: bold;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 3px 0 rgba(0,0,0,0.2);
    transition: transform 0.1s;
  }
  .tile:hover { transform: scale(1.1); }
  .tile.active {
    outline: 4px solid #333;
    transform: scale(1.15);
  }

  /* Quiz section */
  #quizBox {
    display: none;
    background: #fff;
    border-radius: 25px;
    padding: 25px;
    box-shadow: 0 10px 0 rgba(0,0,0,0.15);
    max-width: 500px;
    width: 100%;
  }
  #quizQuestion {
    font-size: 1.4em;
    margin-bottom: 15px;
    color: #444;
  }
  #quizOptions {
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .option {
    font-size: 2.5em;
    font-weight: bold;
    width: 90px;
    height: 90px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 6px 0 rgba(0,0,0,0.2);
    color: #fff;
    transition: transform 0.1s;
  }
  .option:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
  #quizFeedback {
    margin-top: 15px;
    font-size: 1.6em;
    min-height: 40px;
  }
  #score {
    margin-top: 10px;
    font-size: 1.2em;
    color: #444;
  }

  #confetti {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: hidden;
  }
  .piece {
    position: absolute;
    width: 12px; height: 12px;
    top: -20px;
    border-radius: 3px;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(360deg); opacity: 0.8; }
  }
</style>
</head>
<body>

<h1>ABC Fun Land!</h1>
<div id="subtitle">Tap a letter, hear its sound, and play the quiz!</div>

<div id="stage">
  <div id="bigLetter" onclick="speakLetter()">A</div>
  <div id="emoji">🍎</div>
  <div id="wordHint">A is for Apple</div>
</div>

<div id="controls">
  <button id="prevBtn" onclick="changeLetter(-1)">⬅ Back</button>
  <button id="hearBtn" onclick="speakLetter()">🔊 Hear it</button>
  <button id="nextBtn" onclick="changeLetter(1)">Next ➡</button>
  <button id="quizBtn" onclick="toggleQuiz()">🎯 Quiz me!</button>
</div>

<div id="strip"></div>

<div id="quizBox">
  <div id="quizQuestion">Which letter makes this sound?</div>
  <div id="quizOptions"></div>
  <div id="quizFeedback"></div>
  <div id="score">Score: 0</div>
</div>

<div id="confetti"></div>

<script>
  const alphabet = [
    {l:"A", w:"Apple", e:"🍎"}, {l:"B", w:"Ball", e:"⚽"}, {l:"C", w:"Cat", e:"🐱"},
    {l:"D", w:"Dog", e:"🐶"}, {l:"E", w:"Elephant", e:"🐘"}, {l:"F", w:"Fish", e:"🐟"},
    {l:"G", w:"Grapes", e:"🍇"}, {l:"H", w:"Hat", e:"🎩"}, {l:"I", w:"Ice cream", e:"🍦"},
    {l:"J", w:"Juice", e:"🧃"}, {l:"K", w:"Kite", e:"🪁"}, {l:"L", w:"Lion", e:"🦁"},
    {l:"M", w:"Moon", e:"🌙"}, {l:"N", w:"Nest", e:"🪺"}, {l:"O", w:"Orange", e:"🍊"},
    {l:"P", w:"Panda", e:"🐼"}, {l:"Q", w:"Queen", e:"👸"}, {l:"R", w:"Rainbow", e:"🌈"},
    {l:"S", w:"Sun", e:"☀️"}, {l:"T", w:"Tiger", e:"🐯"}, {l:"U", w:"Umbrella", e:"☂️"},
    {l:"V", w:"Van", e:"🚐"}, {l:"W", w:"Watermelon", e:"🍉"}, {l:"X", w:"Xylophone", e:"🎼"},
    {l:"Y", w:"Yoyo", e:"🪀"}, {l:"Z", w:"Zebra", e:"🦓"}
  ];

  const colors = ["#ff6b6b","#f7b731","#20bf6b","#0fb9b1","#2d98da","#8854d0","#eb3b5a","#fa8231"];
  let current = 0;
  let score = 0;

  const bigLetter = document.getElementById("bigLetter");
  const wordHint = document.getElementById("wordHint");
  const emoji = document.getElementById("emoji");
  const strip = document.getElementById("strip");

  function colorFor(i) { return colors[i % colors.length]; }

  function render() {
    const item = alphabet[current];
    bigLetter.textContent = item.l;
    bigLetter.style.color = colorFor(current);
    emoji.textContent = item.e;
    wordHint.textContent = item.l + " is for " + item.w;
    document.querySelectorAll(".tile").forEach((t, i) => {
      t.classList.toggle("active", i === current);
    });
  }

  function buildStrip() {
    alphabet.forEach((item, i) => {
      const tile = document.createElement("div");
      tile.className = "tile";
      tile.style.background = colorFor(i);
      tile.textContent = item.l;
      tile.onclick = () => { current = i; render(); speakLetter(); };
      strip.appendChild(tile);
    });
  }

  function changeLetter(dir) {
    current = (current + dir + alphabet.length) % alphabet.length;
    render();
    speakLetter();
  }

  function speakLetter() {
    const item = alphabet[current];
    const msg = new SpeechSynthesisUtterance(item.l + ". " + item.l + " is for " + item.w);
    msg.rate = 0.85;
    msg.pitch = 1.2;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(msg);
    burstConfetti();
  }

  function burstConfetti() {
    const container = document.getElementById("confetti");
    for (let i = 0; i < 18; i++) {
      const p = document.createElement("div");
      p.className = "piece";
      p.style.left = Math.random() * 100 + "vw";
      p.style.background = colorFor(Math.floor(Math.random()*colors.length));
      p.style.animationDuration = (1.5 + Math.random()) + "s";
      container.appendChild(p);
      setTimeout(() => p.remove(), 3000);
    }
  }

  // Quiz logic
  const quizBox = document.getElementById("quizBox");
  const quizOptions = document.getElementById("quizOptions");
  const quizFeedback = document.getElementById("quizFeedback");
  const scoreDisplay = document.getElementById("score");
  let quizAnswer = null;
  let quizVisible = false;

  function toggleQuiz() {
    quizVisible = !quizVisible;
    quizBox.style.display = quizVisible ? "block" : "none";
    if (quizVisible) newQuestion();
  }

  function newQuestion() {
    quizFeedback.textContent = "";
    const correctIndex = Math.floor(Math.random() * alphabet.length);
    quizAnswer = alphabet[correctIndex].l;

    const msg = new SpeechSynthesisUtterance("Find the letter " + quizAnswer);
    msg.rate = 0.85;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(msg);

    let optionLetters = new Set([quizAnswer]);
    while (optionLetters.size < 4) {
      optionLetters.add(alphabet[Math.floor(Math.random() * alphabet.length)].l);
    }
    optionLetters = Array.from(optionLetters).sort(() => Math.random() - 0.5);

    quizOptions.innerHTML = "";
    optionLetters.forEach((letter, i) => {
      const div = document.createElement("div");
      div.className = "option";
      div.textContent = letter;
      div.style.background = colorFor(i * 3);
      div.onclick = () => checkAnswer(letter, div);
      quizOptions.appendChild(div);
    });
  }

  function checkAnswer(letter, el) {
    if (letter === quizAnswer) {
      score++;
      quizFeedback.textContent = "🎉 Great job!";
      scoreDisplay.textContent = "Score: " + score;
      burstConfetti();
      setTimeout(newQuestion, 1200);
    } else {
      quizFeedback.textContent = "Try again! 🙂";
      el.style.opacity = "0.4";
    }
  }

  buildStrip();
  render();
</script>
</body>
</html>
